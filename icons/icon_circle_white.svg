<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- White Circle Background with Orange Border -->
  <circle cx="256" cy="256" r="248" fill="#FFFFFF" stroke="#FF6B35" stroke-width="8"/>
  
  <!-- Stacked Layers Icon -->
  <g transform="translate(128, 120)">
    <!-- Layer 4 (top) - Dark -->
    <rect x="70" y="0" width="115" height="40" rx="12" fill="#1A1A2E"/>
    <!-- Layer 3 - Teal -->
    <rect x="45" y="55" width="165" height="45" rx="12" fill="#00D9C0"/>
    <!-- Layer 2 - Gold -->
    <rect x="20" y="115" width="215" height="45" rx="12" fill="#F7B801"/>
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="175" width="255" height="50" rx="12" fill="#FF6B35"/>
  </g>
</svg>
