<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Icon: Stacked Layers -->
  <g transform="translate(10, 12)">
    <!-- Layer 4 (top) - White (for dark bg) -->
    <rect x="20" y="0" width="40" height="14" rx="5" fill="#FFFFFF"/>
    <!-- Layer 3 - Teal -->
    <rect x="12" y="19" width="56" height="15" rx="5" fill="#00D9C0"/>
    <!-- Layer 2 - Gold -->
    <rect x="5" y="39" width="70" height="15" rx="5" fill="#F7B801"/>
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="59" width="80" height="16" rx="5" fill="#FF6B35"/>
  </g>
  
  <!-- Text: UMBA (white for dark bg) -->
  <text x="105" y="55" font-family="Arial Black, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">UMBA</text>
  
  <!-- Text: LABS 3D -->
  <text x="105" y="80" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="4" fill="#FF6B35">LABS 3D</text>
</svg>
