<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="orangeGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7B801"/>
    </linearGradient>
  </defs>
  
  <!-- Gradient Rounded Square Background -->
  <rect width="512" height="512" rx="115" fill="url(#orangeGold)"/>
  
  <!-- Stacked Layers Icon -->
  <g transform="translate(128, 120)">
    <!-- Layer 4 (top) - White -->
    <rect x="70" y="0" width="115" height="40" rx="12" fill="#FFFFFF"/>
    <!-- Layer 3 - Teal -->
    <rect x="45" y="55" width="165" height="45" rx="12" fill="#00D9C0"/>
    <!-- Layer 2 - Dark -->
    <rect x="20" y="115" width="215" height="45" rx="12" fill="#1A1A2E"/>
    <!-- Layer 1 (bottom) - White -->
    <rect x="0" y="175" width="255" height="50" rx="12" fill="#FFFFFF"/>
  </g>
</svg>
