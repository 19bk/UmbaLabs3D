<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Icon: Stacked Layers (centered) -->
  <g transform="translate(75, 50)">
    <!-- Layer 4 (top) - Dark -->
    <rect x="42" y="0" width="65" height="24" rx="8" fill="#1A1A2E"/>
    <!-- Layer 3 - Teal -->
    <rect x="28" y="32" width="95" height="26" rx="8" fill="#00D9C0"/>
    <!-- Layer 2 - Gold -->
    <rect x="12" y="66" width="125" height="26" rx="8" fill="#F7B801"/>
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="100" width="150" height="28" rx="8" fill="#FF6B35"/>
  </g>
  
  <!-- Text: UMBALABS -->
  <text x="150" y="220" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#1A1A2E">UMBALABS</text>
  
  <!-- Text: 3D PRINTING -->
  <text x="150" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="5" fill="#FF6B35">3D PRINTING</text>
</svg>
