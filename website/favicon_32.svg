<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark Rounded Square Background -->
  <rect width="32" height="32" rx="6" fill="#1A1A2E"/>
  
  <!-- Simplified Stacked Layers Icon -->
  <g transform="translate(6, 6)">
    <!-- Layer 4 (top) - White -->
    <rect x="5" y="0" width="10" height="4" rx="1" fill="#FFFFFF"/>
    <!-- Layer 3 - Teal -->
    <rect x="3" y="5" width="14" height="4" rx="1" fill="#00D9C0"/>
    <!-- Layer 2 - Gold -->
    <rect x="1" y="10" width="18" height="4" rx="1" fill="#F7B801"/>
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="15" width="20" height="5" rx="1" fill="#FF6B35"/>
  </g>
</svg>
