<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Icon: Stacked Layers -->
  <g transform="translate(10, 10)">
    <!-- Layer 4 (top) - Dark -->
    <rect x="16" y="0" width="44" height="12" rx="4" fill="#1A1A2E"/>
    <!-- Layer 3 - Teal -->
    <rect x="10" y="18" width="56" height="14" rx="4" fill="#00D9C0"/>
    <!-- Layer 2 - Gold -->
    <rect x="5" y="38" width="66" height="14" rx="4" fill="#F7B801"/>
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="58" width="76" height="14" rx="4" fill="#FF6B35"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="50" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#1A1A2E">UMBA</text>
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#FF6B35">LABS 3D</text>
</svg>
