<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="195" fill="#1A1A2E"/>
  
  <!-- Layered 3D Icon -->
  <g transform="translate(100, 100)">
    <!-- Layer 4 (top) - Dark -->
    <rect x="55" y="30" width="90" height="25" rx="6" fill="#FFFFFF"/>
    
    <!-- Layer 3 - Teal -->
    <rect x="35" y="65" width="130" height="28" rx="6" fill="#00D9C0"/>
    
    <!-- Layer 2 - Gold -->
    <rect x="15" y="103" width="170" height="28" rx="6" fill="#F7B801"/>
    
    <!-- Layer 1 (bottom) - Orange -->
    <rect x="0" y="141" width="200" height="30" rx="6" fill="#FF6B35"/>
  </g>
  
  <!-- Text: UMBA -->
  <text x="200" y="300" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">UMBA</text>
  
  <!-- Text: LABS 3D -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="4" fill="#FF6B35">LABS 3D</text>
</svg>
